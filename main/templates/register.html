<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ลงทะเบียน | Surgery Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-bg">
    <div class="auth-card">
        <h2>📝 ลงทะเบียนแพทย์</h2>
        
        <form method="post">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="alert alert-error" style="background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; border: 1px solid #f5c6cb;">
                    {% for field in form %}
                        {% for error in field.errors %}
                            <strong>{{ field.label }}:</strong> {{ error }}<br>
                        {% endfor %}
                    {% endfor %}
                </div>
            {% endif %}

            <div class="form-group">
                <label><i class="fa-solid fa-user"></i> ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" name="username" class="form-control" required placeholder="ระบุชื่อผู้ใช้งาน" value="{{ form.username.value|default:'' }}">
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-lock"></i> รหัสผ่าน (Password)</label>
                <div style="position: relative;">
                    <input type="password" name="password1" id="id_password1" class="form-control" required placeholder="ระบุรหัสผ่าน">
                    <span onclick="togglePass('id_password1', this)" style="position: absolute; right: 12px; top: 12px; cursor: pointer; color: #888;">
                        <i class="fa-solid fa-eye"></i>
                    </span>
                </div>
                <p style="font-size: 0.7rem; color: #666; margin-top: 5px;">*อย่างน้อย 8 ตัวอักษร (แนะนำให้มีตัวเลขและอักษรใหญ่)</p>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-check-double"></i> ยืนยันรหัสผ่าน</label>
                <input type="password" name="password2" id="id_password2" class="form-control" required placeholder="กรอกรหัสผ่านอีกครั้ง">
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">สร้างบัญชีผู้ใช้</button>
        </form>

        <div class="auth-footer" style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
            มีบัญชีอยู่แล้ว? <a href="{% url 'login' %}" style="color: #007bff; text-decoration: none; font-weight: bold;">เข้าสู่ระบบที่นี่</a>
        </div>
    </div>

    <script>
        function togglePass(id, el) {
            const input = document.getElementById(id);
            const icon = el.querySelector('i');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
